name: 代码检查
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: 获取PNPM store路径
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 设置pnpm缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 安装Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 安装前端依赖
        run: pnpm install --no-frozen-lockfile

      - name: 检查TypeScript类型
        run: pnpm tsc --noEmit

      - name: 检查Rust代码
        run: cd src-tauri && cargo clippy -- -D warnings 