name: 发布应用
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: 获取PNPM store路径
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 设置pnpm缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 安装Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖（macOS）
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: 安装前端依赖
        run: |
          pnpm install --no-frozen-lockfile

      - name: 构建应用（macOS）
        if: matrix.platform == 'macos-latest'
        run: |
          pnpm tauri build --target universal-apple-darwin

      - name: 构建应用（Windows）
        if: matrix.platform == 'windows-latest'
        run: |
          pnpm tauri build

      - name: 列出安装程序文件
        shell: bash
        run: |
          echo "最终安装程序文件:"
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            find src-tauri/target -name "*.dmg" | sort
          else
            find src-tauri/target -name "*.msi" -o -name "*.exe" | grep -v "build-script" | sort
          fi

      # 仅收集最终安装程序文件，不包括中间构建文件
      - name: 准备安装程序文件
        shell: bash
        id: prepare_assets
        run: |
          mkdir -p release_assets
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            # macOS
            cp src-tauri/target/release/bundle/dmg/*.dmg release_assets/ 2>/dev/null || true
            cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg release_assets/ 2>/dev/null || true
          else
            # Windows - 简化路径搜索，复制所有MSI和EXE (非构建脚本)
            find src-tauri/target/release -name "*.msi" -o -name "*.exe" | grep -v "build-script" | xargs -I{} cp {} release_assets/ 2>/dev/null || true
          fi
          echo "包含的文件:"
          ls -la release_assets/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installer
          path: release_assets
          if-no-files-found: warn

  publish:
    permissions:
      contents: write
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出下载的构建产物
        shell: bash
        run: |
          echo "下载的构建产物:"
          find artifacts -type f | sort

      - name: 创建发布
        uses: softprops/action-gh-release@v1
        with:
          files: "artifacts/**/*"
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
