name: 发布应用
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: 获取PNPM store路径
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 设置pnpm缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 安装Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖（macOS）
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: 安装前端依赖
        run: |
          pnpm install --no-frozen-lockfile

      - name: 构建应用（macOS）
        if: matrix.platform == 'macos-latest'
        run: |
          pnpm tauri build --target universal-apple-darwin

      - name: 构建应用（Windows）
        if: matrix.platform == 'windows-latest'
        run: |
          pnpm tauri build

      - name: 列出构建产物
        if: matrix.platform == 'macos-latest' || matrix.platform == 'windows-latest'
        shell: bash
        run: |
          echo "构建产物位置:"
          find src-tauri/target -name "*.dmg" -o -name "*.app" -o -name "*.msi" -o -name "*.exe" | sort

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/**/*.dmg
            src-tauri/target/**/*.app
            src-tauri/target/**/*.msi
            src-tauri/target/**/*.exe
          if-no-files-found: warn

  publish:
    permissions:
      contents: write
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出下载的构建产物
        shell: bash
        run: |
          echo "下载的构建产物:"
          find artifacts -type f | sort

      - name: 创建发布
        uses: softprops/action-gh-release@v1
        with:
          files: "artifacts/**/*"
          draft: true
          generate_release_notes: true
